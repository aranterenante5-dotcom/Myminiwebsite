    <style>
        /* GLOBAL STYLES */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVIGATION BAR */
        nav {
            width: 100%;
            background-color: #1a1a1a;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            border-bottom: 2px solid #e91e63;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        nav a.active {
            color: #e91e63;
        }

        /* CONTAINER & CARD */
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px 0;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        /* MEDIA STYLING */
        .media-placeholder {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #333;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .media-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 { font-size: 1.4rem; margin-bottom: 10px; }
        h1 { font-size: 2.2rem; }

        audio, video {
            width: 100%;
            margin-bottom: 25px;
            border-radius: 10px;
        }

        /* HIDE SECTIONS BY DEFAULT */
        .page-section { display: none; }
        .page-section.active-section { display: block; }

    </style>
</head>

    <script>
        function showPage(pageId) {
            // Remove active class from all sections
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active-section');
            });
            // Hide active state on nav links
            document.querySelectorAll('nav a').forEach(link => {
                link.classList.remove('active');
            });

            // Show selected section
            document.getElementById(pageId).classList.add('active-section');
            // Set active state on clicked nav link
            document.getElementById('link-' + pageId).classList.add('active');
            
            // Scroll to top automatically
            window.scrollTo(0,0);
        }
    </script>
